name: Build and Push Images

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY_PREFIX: ${{ vars.ECR_REPOSITORY_PREFIX }}

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check trigger status
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build and Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            dockerfile: apps/api-gateway/Dockerfile
          - service: auth-service
            dockerfile: apps/auth-service/Dockerfile
          - service: product-service
            dockerfile: apps/product-service/Dockerfile
          - service: order-service
            dockerfile: apps/order-service/Dockerfile
          - service: payment-service
            dockerfile: apps/payment-service/Dockerfile
          - service: review-service
            dockerfile: apps/review-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          else
            COMMIT_SHA="${{ github.sha }}"
          fi
          SHORT_SHA="${COMMIT_SHA:0:12}"

          REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          REPO="${{ env.ECR_REPOSITORY_PREFIX }}-${{ matrix.service }}"

          echo "image_uri=$REGISTRY/$REPO" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build \
            -f "${{ matrix.dockerfile }}" \
            -t "${{ steps.tags.outputs.image_uri }}:${{ steps.tags.outputs.sha_tag }}" \
            -t "${{ steps.tags.outputs.image_uri }}:latest" \
            .

      - name: Push image tags
        run: |
          docker push "${{ steps.tags.outputs.image_uri }}:${{ steps.tags.outputs.sha_tag }}"
          docker push "${{ steps.tags.outputs.image_uri }}:latest"
