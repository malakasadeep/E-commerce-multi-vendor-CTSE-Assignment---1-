name: Deploy to EC2

on:
  workflow_run:
    workflows: ['Build and Push Images']
    types: [completed]
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment tag on EC2 instances (staging or production)
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY_PREFIX: ${{ vars.ECR_REPOSITORY_PREFIX }}
  CONTAINER_NAME_PREFIX: ${{ vars.CONTAINER_NAME_PREFIX }}

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      commit_sha: ${{ steps.check.outputs.commit_sha }}
      deploy_env: ${{ steps.check.outputs.deploy_env }}
    steps:
      - name: Check trigger status
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "commit_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "deploy_env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event.workflow_run.head_branch }}" = "main" ] || [ "${{ github.event.workflow_run.head_branch }}" = "master" ]; then
            echo "deploy_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_env=staging" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - service: auth-service
            port: 6001
          - service: product-service
            port: 6002
          - service: order-service
            port: 6003
          - service: payment-service
            port: 6004
          - service: review-service
            port: 6005
          - service: api-gateway
            port: 8080

    environment:
      name: ${{ needs.guard.outputs.deploy_env }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve AWS account and image
        id: vars
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          SHORT_SHA="${{ needs.guard.outputs.commit_sha }}"
          SHORT_SHA="${SHORT_SHA:0:12}"

          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_PREFIX }}-${{ matrix.service }}:sha-${SHORT_SHA}"
          CONTAINER_NAME="${{ env.CONTAINER_NAME_PREFIX }}-${{ matrix.service }}"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "container_name=$CONTAINER_NAME" >> "$GITHUB_OUTPUT"
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"

      - name: Resolve target instance from tags
        id: target
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Service,Values=${{ matrix.service }}" \
              "Name=tag:Environment,Values=${{ needs.guard.outputs.deploy_env }}" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)

          COUNT=$(echo "$INSTANCE_IDS" | wc -w | tr -d ' ')

          if [ "$COUNT" -eq 0 ]; then
            echo "No running EC2 instance found for Service=${{ matrix.service }} Environment=${{ needs.guard.outputs.deploy_env }}"
            exit 1
          fi

          if [ "$COUNT" -gt 1 ]; then
            echo "Multiple running instances found for Service=${{ matrix.service }} Environment=${{ needs.guard.outputs.deploy_env }}: $INSTANCE_IDS"
            echo "For Option A, deployment expects exactly one target instance per service/environment tag pair."
            exit 1
          fi

          echo "instance_id=$INSTANCE_IDS" >> "$GITHUB_OUTPUT"

      - name: Deploy with SSM Run Command
        id: deploy_ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ matrix.service }} from GitHub Actions" \
            --instance-ids "${{ steps.target.outputs.instance_id }}" \
            --parameters commands="[
              \"set -e\",
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.vars.outputs.registry }}\",
              \"docker pull ${{ steps.vars.outputs.image_uri }}\",
              \"docker rm -f ${{ steps.vars.outputs.container_name }} || true\",
              \"docker run -d --name ${{ steps.vars.outputs.container_name }} --restart unless-stopped --env-file /opt/${{ matrix.service }}/.env -p ${{ matrix.port }}:${{ matrix.port }} ${{ steps.vars.outputs.image_uri }}\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "CommandId=$COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ steps.target.outputs.instance_id }}"

      - name: Show deployment output
        if: always()
        run: |
          aws ssm list-command-invocations \
            --details \
            --command-id "${{ steps.deploy_ssm.outputs.command_id }}" || true
