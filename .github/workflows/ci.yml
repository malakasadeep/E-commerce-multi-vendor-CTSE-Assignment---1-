name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Test, Build, Typecheck
    runs-on: ubuntu-latest
    env:
      NX_NO_CLOUD: 'true'
      NX_DAEMON: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci || {
            echo "package-lock mismatch detected, falling back to npm install"
            npm install
          }

      - name: Nx lint
        run: npx nx run-many -t lint --all --parallel=3

      - name: Nx test
        run: npx nx run-many -t test --all --parallel=3 --skip-nx-cache

      - name: Nx build
        run: npx nx run-many -t build --all --parallel=2

      - name: Nx typecheck
        run: npx nx run-many -t typecheck --all --parallel=2

  sonar:
    name: Sonar Scan and Quality Gate
    runs-on: ubuntu-latest
    needs: quality
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 15
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Sonar skip note
        if: env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == ''
        run: |
          echo "SONAR_TOKEN or SONAR_HOST_URL is not configured. Skipping Sonar analysis."

  finalize:
    name: CI Finalize
    runs-on: ubuntu-latest
    needs: [quality, sonar]
    if: always()
    steps:
      - name: Fail on upstream issues
        run: |
          if [ "${{ needs.quality.result }}" != "success" ]; then
            echo "Quality job failed"
            exit 1
          fi
          if [ "${{ needs.sonar.result }}" != "success" ] && [ "${{ needs.sonar.result }}" != "skipped" ]; then
            echo "Sonar job failed"
            exit 1
          fi
          echo "CI completed successfully"
