# SonarQube project metadata
sonar.projectKey=e-commerce-multi-vendor
sonar.projectName=e-commerce-multi-vendor
sonar.sourceEncoding=UTF-8

# Analyze monorepo sources
sonar.sources=apps,packages,libs,middleware
sonar.tests=apps
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/coverage/**,**/*.d.ts,**/swagger-output.json

# Optional coverage paths (if generated in CI)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
